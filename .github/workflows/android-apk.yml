# Сборка APK-обёртки для Sunmi через Gradle Wrapper (версия закреплена в
# android/gradle/wrapper/gradle-wrapper.properties) — НЕ зависит от глобального
# gradle раннера. Запуск вручную: GitHub → Actions → Android APK → Run workflow.
#
# Джобы:
#   • debug   — всегда, артефакт помечен как DEBUG (НЕ для продакшена).
#   • release — только вручную и при заданных секретах подписи; подписанный APK.
name: Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Скачиваем gradle-wrapper.jar под закреплённую версию, если его нет в репо
      # (бинарник не коммитим). Даёт рабочий ./gradlew без глобального gradle.
      - name: Ensure gradle wrapper jar
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            VER=$(grep -oP 'gradle-\K[0-9.]+(?=-bin.zip)' gradle/wrapper/gradle-wrapper.properties)
            curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v${VER}.0/gradle/wrapper/gradle-wrapper.jar"
          fi

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          # Явно DEBUG в имени — не путать с релизом
          name: kassa-sunmi-apk-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    runs-on: ubuntu-latest
    # Только по ручному запуску; сама сборка идёт лишь при заданных секретах.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure gradle wrapper jar
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            VER=$(grep -oP 'gradle-\K[0-9.]+(?=-bin.zip)' gradle/wrapper/gradle-wrapper.properties)
            curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v${VER}.0/gradle/wrapper/gradle-wrapper.jar"
          fi

      # Ключ подписи — из секретов (base64). Никогда не коммитим keystore.
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore

      - name: Build release APK
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - uses: actions/upload-artifact@v4
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        with:
          name: kassa-sunmi-apk-release
          path: android/app/build/outputs/apk/release/app-release.apk
