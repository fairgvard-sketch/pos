# CI: фронтенд, размер стартового бандла и SQL-инварианты на каждый push/PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Schema version guard
        run: npm run check:schema

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          # Сборке нужны переменные Vite; для CI достаточно плейсхолдеров —
          # реальные значения не требуются (tsc + бандл, без обращения к Supabase).
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Bundle budget
        run: npm run check:bundle

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # При падении шага хвост лога публикуется error-аннотацией: логи джоба
      # приватны, а аннотации у публичного репо читаются без авторизации —
      # так причина видна сразу из API/чата без входа в Actions.
      - name: Start local Supabase and apply migrations
        run: |
          if ! supabase start > start.log 2>&1; then
            msg=$(tail -c 3000 start.log); msg="${msg//$'\n'/%0A}"
            echo "::error title=supabase start failed::${msg}"
            exit 1
          fi

      - name: Rebuild database from migrations
        run: |
          if ! supabase db reset > reset.log 2>&1; then
            msg=$(tail -c 3000 reset.log); msg="${msg//$'\n'/%0A}"
            echo "::error title=supabase db reset failed::${msg}"
            exit 1
          fi

      - name: Test RLS and financial idempotency
        run: |
          if ! supabase test db > test.log 2>&1; then
            msg=$(tail -c 3000 test.log); msg="${msg//$'\n'/%0A}"
            echo "::error title=supabase test db failed::${msg}"
            exit 1
          fi

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
