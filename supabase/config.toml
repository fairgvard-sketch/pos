project_id = "kassa"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# 17 — как в production (17.6). На 15 падает GRANT ... MAINTAIN из 071:
# привилегия MAINTAIN существует только с PostgreSQL 17.
major_version = 17

[studio]
enabled = false

# Логовый стек (vector/logflare) не нужен для db reset/test и несовместим
# с colima (mount docker.sock). Отключён и локально, и в CI.
[analytics]
enabled = false

[inbucket]
enabled = false

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true
